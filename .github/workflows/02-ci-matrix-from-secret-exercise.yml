name: Pattern A - Matrix From Secret (Correct)

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest

    outputs:
      versions: ${{ steps.set.outputs.versions }}

    steps:
      - name: Read secret and set output
        id: set
        run: |
          echo "versions=${{ secrets.VERSIONS }}" >> $GITHUB_OUTPUT

  matrix-job:
    runs-on: ubuntu-latest
    needs: prepare-matrix

    strategy:
      matrix:
        version: ${{ fromJSON(needs.prepare-matrix.outputs.versions) }}

    steps:
      - name: Print version
        run: echo "Running version ${{ matrix.version }}"