name: 90 OPTIONAL Full Containerized CI/CD Workflow-dockerfile

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app-full.tar
  ARTIFACT_NAME: tiny-health-app-full-image
  APP_PORT: "8000"

jobs:
  # -------------------------
  # JOB 1: VERIFY
  # -------------------------
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  # -------------------------
  # JOB 2: BUILD + DEPLOY (MATRIX)
  # -------------------------
  build-deploy:
    needs: verify
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}-${{ matrix.python-version }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (with ARG)
        run: |
          docker build \
            --build-arg BASE_IMAGE=python:${{ matrix.python-version }} \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            -f Dockerfile.arg-base \
            .

      - name: Save image as tar
        run: |
          docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

      - name: Load Docker image
        run: docker load --input "${IMAGE_TAR}"

      - name: Run container
        run: |
          docker run -d \
            --name tiny-container-${{ matrix.python-version }} \
            -p "${APP_PORT}:${APP_PORT}" \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "waiting for app..."
            sleep 2
          done
          echo "App failed to start"
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f tiny-container-${{ matrix.python-version }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.python-version }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7