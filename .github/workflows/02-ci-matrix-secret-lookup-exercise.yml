name: Pattern B - Fixed Matrix With Secret Lookup

on:
  workflow_dispatch:

jobs:
  matrix-job:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - version: v1
            version_secret: SECRET_V1
          - version: v2
            version_secret: SECRET_V2
          - version: v3
            version_secret: SECRET_V3

    steps:
      - name: Print version and secret
        run: |
          echo "Version: ${{ matrix.version }}"
          echo "Secret value: ${{ secrets[matrix.version_secret] }}"